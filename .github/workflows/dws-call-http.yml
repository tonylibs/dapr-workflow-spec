name: dws-call-http

on:
  push:
    branches: [main]
    paths:
      - 'dws-call-http/**'
      - '.github/workflows/dws-call-http.yml'
  pull_request:
    paths:
      - 'dws-call-http/**'
      - '.github/workflows/dws-call-http.yml'
  workflow_dispatch:

concurrency:
  group: dws-call-http-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dws-call-http

jobs:
  test:
    name: compile & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dws-call-http
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: dws-call-http/go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o bin/dws-call-http .

      - name: Test
        run: go test -race ./...

  build-image:
    name: build & push image
    needs: test
    # Only build & push when changes land on main (i.e. after a PR merges).
    # Pull requests stop at compile & test.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dws-call-http
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dws-call-http
          cache-to: type=gha,mode=max,scope=dws-call-http
