name: dws-controller

on:
  push:
    branches: [main]
    paths:
      - 'dws-controller/**'
      - '.github/workflows/dws-controller.yml'
  pull_request:
    paths:
      - 'dws-controller/**'
      - '.github/workflows/dws-controller.yml'
  workflow_dispatch:

concurrency:
  group: dws-controller-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dws-controller

jobs:
  test:
    name: compile & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dws-controller
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # The build generates the cdk8s Knative/Dapr imports at generate-sources
      # time by running `cdk8s import`, which shells out to Node.js via jsii.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Compile
        run: ./mvnw -B -ntp clean compile

      - name: Test
        run: ./mvnw -B -ntp test

  build-image:
    name: build & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: dws-controller
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # cdk8s import (generate-sources) needs Node.js to package the app.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Dockerfile.jvm copies a prebuilt target/quarkus-app/, so package first.
      - name: Package
        run: ./mvnw -B -ntp -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip on PRs: the image is built for validation but not pushed.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dws-controller
          file: dws-controller/src/main/docker/Dockerfile.jvm
          # Build on PRs to validate the Dockerfile; only push on merge to main.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dws-controller
          cache-to: type=gha,mode=max,scope=dws-controller
