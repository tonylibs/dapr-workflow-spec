name: order-events
deploy:
  valid: true
  expectSteps: [place-order]
  # the emit task records an EMIT topic binding on the event's type.
  expectBindings: [order-placed]
scenarios:
  - name: placed
    input: { item: widget }
    calls:
      - appId: place-order
        result: { item: widget, orderId: o-1 }
    expectCalls: [place-order]
    # at runtime the emit topic is the kebab-cased task name; pubsub is the configured default.
    expectEmits:
      - pubsub: pubsub
        topic: publish-placed
    expectOutput: { item: widget, orderId: o-1 }
