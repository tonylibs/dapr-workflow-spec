  # set/switch tasks deploy nothing: the stack is definition + orchestrator only.
  expectSteps: []
  expectBindings: []
scenarios:
  - name: big-order
    input: { price: 50, quantity: 3 }
    expectCalls: []
    expectOutput: { price: 50, quantity: 3, total: 150, discounted: true }
