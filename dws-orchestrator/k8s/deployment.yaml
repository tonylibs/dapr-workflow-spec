apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-workflow
  labels:
    app: order-workflow
    component: dws-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-workflow
  template:
    metadata:
      labels:
        app: order-workflow
        component: dws-orchestrator
      annotations:
        dapr.io/enabled: "true"
        # One app-id per workflow: this pod IS the order-workflow.
        dapr.io/app-id: "order-workflow"
        dapr.io/app-port: "8080"
        dapr.io/app-protocol: "http"
        dapr.io/enable-api-logging: "true"
    spec:
      containers:
        - name: orchestrator
          # Prebuilt, generic orchestrator image — no per-workflow code.
          image: sw-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # Load exactly one immutable, versioned definition from the Configuration store.
            - name: DAPR_CONFIG_STORE
              value: "dws-definitions"
            - name: DEFINITION_KEY
              value: "order-workflow@v1"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
