server:
  port: 8080

spring:
  application:
    name: dws-orchestrator

# Actuator: expose health/info for Kubernetes probes.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# Dapr sidecar wiring. The SDK reads DAPR_GRPC_PORT / DAPR_HTTP_PORT from the environment
# (injected by the Dapr sidecar); these values are surfaced here for clarity/local overrides.
dapr:
  grpc:
    port: ${DAPR_GRPC_PORT:50001}
  http:
    port: ${DAPR_HTTP_PORT:3500}

# Orchestrator behaviour.
dws:
  # Dapr Configuration store component holding workflow definitions.
  config-store: ${DAPR_CONFIG_STORE:dws-definitions}
  # Immutable, versioned key for this pod's single definition (e.g. order-workflow@v3). Required.
  definition-key: ${DEFINITION_KEY:}
  # Default pub/sub component for EMIT tasks.
  default-pubsub: ${DWS_DEFAULT_PUBSUB:pubsub}
  # Retry/backoff for fetching the definition while the Dapr sidecar boots.
  config-fetch:
    max-attempts: ${DWS_CONFIG_MAX_ATTEMPTS:30}
    retry-interval: ${DWS_CONFIG_RETRY_INTERVAL:PT2S}
  # Default activity retry policy applied to CALL and EMIT tasks.
  retry:
    max-attempts: ${DWS_RETRY_MAX_ATTEMPTS:3}
    first-retry-interval: ${DWS_RETRY_FIRST_INTERVAL:PT1S}
    backoff-coefficient: ${DWS_RETRY_BACKOFF:2.0}
    max-retry-interval: ${DWS_RETRY_MAX_INTERVAL:PT30S}

logging:
  level:
    io.dws.orchestrator: INFO
